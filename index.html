<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Examen para el pro Edgarillo</title>

    <style>
        body {
            background-color: black;
            font-family: Arial;
            margin: 20px;
            overflow-x: hidden
        }
        
        h1 {
            color: rgb(216, 26, 26);
            text-align: center;
        }
        
        h2 {
            color: rgb(3, 153, 15);
        }
        
        label {
            color: white;
            display: block;
            margin-top: 10px;
        }
        
        textarea {
            width: 30%;
            height: 60px;
            margin-top: 5px;
        }
        
        button {
            color: rgb(163, 5, 5);
            background-color: white;
            padding: 10px;
            font-size: 16px;
            font-family: Arial;
            cursor: pointer;
            margin-top: 20px;
        }
        /* Fondo y animación */
        
        .cubo {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: flotar 10s linear infinite;
        }
        
        .cubo {
            position: fixed;
            bottom: -60px;
            /* 👈 clave */
            width: 40px;
            height: 40px;
            /* estilo tipo Rubik */
            border-top: 2px solid red;
            border-right: 2px solid blue;
            border-bottom: 2px solid green;
            border-left: 2px solid yellow;
            animation: flotar 12s linear infinite;
            opacity: 0.6;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        @keyframes flotar {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>




<body>

        <button type="button" onclick="guardarTXT()">Guardar respuestas</button>

    <script>
        function guardarTXT() {

            let respuestas = document.querySelectorAll("textarea");
            let texto = "Respuestas del examen:\n\n";

            // 🔴 VALIDACIÓN
            for (let i = 0; i < respuestas.length; i++) {
                if (respuestas[i].value.trim() === "") {
                    alert("❌ Debes responder TODAS las preguntas antes de guardar.");
                    respuestas[i].focus();
                    return; // 💥 detiene todo
                }
            }

            // 🟢 SI TODO ESTÁ LLENO, CONTINÚA
            respuestas.forEach((r, i) => {
                texto += "Pregunta " + (i + 1) + ":\n" + r.value + "\n\n";
            });

            let blob = new Blob([texto], {
                type: "text/plain"
            });
            let enlace = document.createElement("a");

            enlace.href = URL.createObjectURL(blob);
            enlace.download = "respuestas.txt";
            enlace.click();
        }
    </script>
