<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tienda Express</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>🛒 Frutería la Pasadita</h1>
        <input type="text" id="busqueda" placeholder="¿Qué buscas?" onkeyup="buscar()">
    </header>

    <div class="menu">
        <div onclick="filtrar('todos')">Todos</div>
        <div onclick="filtrar('bebidas')">Bebidas</div>
        <div onclick="filtrar('snacks')">Snacks</div>
        <div onclick="filtrar('lacteos')">Lácteos</div>
        <div onclick="filtrar('promos')">Promociones</div>
    </div>

    <!-- CARRUSEL -->
    <div class="carousel">
        <img id="slider" src="img/banner1.jpg">
    </div>

    <!-- PRODUCTOS -->
    <div class="container">

        <div class="card bebidas" class="card lacteos oculto">
            <img src="img/coca.jpg">
            <div class="card-content">
                <h3>Coca Cola</h3>
                <p class="price">$18</p>
            </div>
        </div>

        <div class="card snacks promos">
            <img src="img/papas.jpg">
            <div class="card-content">
                <h3>Papas</h3>
                <p class="price">$25</p>
                <span class="tag">Promo</span>
            </div>
        </div>

        <div class="card lacteos">
            <img src="img/leche.jpg">
            <div class="card-content">
                <h3>Leche</h3>
                <p class="price">$30</p>
            </div>


        </div>




    </div>

    <script src="js/script.js"></script>

</body>

</html>
