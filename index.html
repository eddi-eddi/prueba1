<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <style>

</head>

<body>



    <h1>Examen PRO para el Proasooo</h1>

        <button type="button" onclick="guardarTXT()">Guardar respuestas</button>

    </form>

    <script>
        function guardarTXT() {

            let respuestas = document.querySelectorAll("textarea");
            let texto = "Respuestas del examen:\n\n";

            // 🔴 VALIDACIÓN
            for (let i = 0; i < respuestas.length; i++) {
                if (respuestas[i].value.trim() === "") {
                    alert("❌ Debes responder TODAS las preguntas antes de guardar.");
                    respuestas[i].focus();
                    return; // 💥 detiene todo
                }
            }

            // 🟢 SI TODO ESTÁ LLENO, CONTINÚA
            respuestas.forEach((r, i) => {
                texto += "Pregunta " + (i + 1) + ":\n" + r.value + "\n\n";
            });

            let blob = new Blob([texto], {
                type: "text/plain"
            });
            let enlace = document.createElement("a");

            enlace.href = URL.createObjectURL(blob);
            enlace.download = "respuestas.txt";
            enlace.click();
        }
    </script>

</html>
